<!DOCTYPE html>
<html>
<head>
<title>Priyanshu Fashion Store</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-size:26px;
}

.search{
text-align:center;
padding:20px;
}

.search input{
width:60%;
padding:10px;
font-size:16px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:green;
font-size:18px;
}

button{
background:#111;
color:white;
border:none;
padding:10px 15px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:red;
}

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<header>
Priyanshu Fashion Store
</header>

<div class="search">
<input type="text" placeholder="Search product...">
</div>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Luxury Watch</h3>
<p class="price">₹999</p>
<a href="https://wa.me/918102961267">
<button>Order on WhatsApp</button>
</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Cool T-Shirt</h3>
<p class="price">₹499</p>
<a href="https://wa.me/918102961267">
<button>Order on WhatsApp</button>
</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Running Shoes</h3>
<p class="price">₹1499</p>
<a href="https://wa.me/918102961267">
<button>Order on WhatsApp</button>
</a>
</div>

</div>

<footer>
© 2026 Priyanshu Fashion Store
</footer>

</body>
</html>
