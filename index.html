<!DOCTYPE html>
<html>
<head>
<title>Priyanshu Fashion Store</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

.products{
display:flex;
justify-content:center;
gap:30px;
padding:40px;
}

.card{
background:white;
padding:20px;

box-shadow:0 0 10px rgba(0,0,0,0.2);

.card img{
width:100%;
border-radius:10px;
}

button{
background:black;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:red;
}

footer{
text-align:center;
padding:15px;
background:black;
color:white;
}

</style>

</head>

<body>

<header>
Priyanshu Fashion Store
</header>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">

<p>₹999</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Fashion T-Shirt</h3>
<p>₹499</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Cool Shoes</h3>
<p>₹1499</p>
<button>Buy Now</button>
</div>

</div>

<footer>
© 2026 Priyanshu Fashion Store
</footer>

</html>
